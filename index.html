<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U+ 중부소매영업팀 - SUPER U+ HEROES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DungGeunMo&display=swap');
        
        :root {
            --uplus-magenta: #E6007E;
            --mario-sky: #5c94fc;
            --brick-red: #ab3916;
        }

        body {
            background-color: var(--mario-sky);
            color: #fff;
            font-family: 'DungGeunMo', cursive;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* 마리오 배경 이미지 적용 (파일명을 mario_bg.jpg 로 저장하세요) */
            background-image: url('mario_bg.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
        }

        /* 마리오 스타일 구름 */
        .cloud {
            position: absolute;
            background: white;
            width: 120px;
            height: 45px;
            border-radius: 25px;
            z-index: -1;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.1);
        }
        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud::after { width: 60px; height: 60px; top: -30px; left: 20px; }
        .cloud::before { width: 50px; height: 50px; top: -25px; left: 55px; }

        /* 바닥 지형 */
        .ground {
            background: #ab3916;
            background-image: 
                linear-gradient(90deg, transparent 90%, rgba(0,0,0,0.2) 90%),
                linear-gradient(0deg, transparent 90%, rgba(0,0,0,0.2) 90%);
            background-size: 30px 30px;
            height: 60px;
            width: 100%;
            position: fixed;
            bottom: 0;
            border-top: 6px solid #000;
            z-index: 10;
        }

        /* 히어로 레고 블록 카드 */
        .hero-card {
            background: #fff;
            border: 4px solid #000;
            image-rendering: pixelated;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.3);
        }
        .hero-card:hover {
            transform: scale(1.05) translateY(-15px);
            box-shadow: 12px 12px 0px rgba(0,0,0,0.4);
        }
        .hero-card .hero-bg {
            background: #eee;
            border-bottom: 4px solid #000;
            position: relative;
            overflow: hidden;
        }

        /* 스탯 바 스타일 */
        .stat-container {
            background: #000;
            height: 18px;
            padding: 2px;
            border: 2px solid #000;
        }
        .stat-fill {
            height: 100%;
            width: 0%;
            transition: width 1s ease-out;
        }

        /* 캐릭터 이미지 맞춤 설정 */
        .character-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
        }

        /* 모달 대화창 */
        .rpg-dialog {
            background: #fff;
            border: 6px solid #000;
            color: #000;
            padding: 24px;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.3);
            max-width: 650px;
            width: 90%;
        }

        #statusModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .pixel-font { font-family: 'Press Start 2P', cursive; }
    </style>
</head>
<body class="pb-24">

    <!-- 배경 구름들 -->
    <div class="cloud" style="top: 50px; left: 10%; animation: float 15s infinite linear;"></div>
    <div class="cloud" style="top: 120px; left: 75%; transform: scale(1.3);"></div>
    <div class="cloud" style="top: 250px; left: 40%; opacity: 0.5;"></div>

    <div class="max-w-6xl mx-auto px-4 pt-12 relative">
        <!-- 타이틀 로고 -->
        <div class="text-center mb-16">
            <div class="inline-block bg-white border-4 border-black p-4 shadow-[8px_8px_0px_#000]">
                <h1 class="text-4xl md:text-5xl font-black text-black uppercase tracking-tighter" style="text-shadow: 3px 3px 0px #E6007E;">
                    U+ 중부 HEROES
                </h1>
                <p class="text-black font-bold mt-2">SELECT YOUR SPECIAL AGENT</p>
            </div>
        </div>

        <!-- 캐릭터 선택창 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
            
            <!-- 정민철 팀장 (타노스) -->
            <div class="hero-card" onclick="showStatus('정민철', '팀장', 'INFINITY LEADER', '99', '99', '80', 'lego_thanos.jpg', '손가락 튕기기 한 번으로 중부소매의 목표를 달성하는 절대적 리더입니다.')">
                <div class="hero-bg h-48 flex items-center justify-center bg-white">
                    <img src="lego_thanos.jpg" alt="타노스" class="character-img" onerror="this.src='https://via.placeholder.com/150/E6007E/FFFFFF?text=THANOS'">
                </div>
                <div class="p-4 text-center">
                    <h3 class="text-xl font-bold text-black mb-1">정민철</h3>
                    <p class="text-xs text-purple-700 font-bold">INFINITY LEADER</p>
                </div>
            </div>

            <!-- 박찬영 책임 (토르) -->
            <div class="hero-card" onclick="showStatus('박찬영', '책임', 'THUNDER MAKER', '85', '90', '95', 'lego_thor.jpg', '강력한 묠니르(업무력)로 팀의 핵심을 담당하는 천둥의 신!')">
                <div class="hero-bg h-48 flex items-center justify-center bg-white">
                    <img src="lego_thor.jpg" alt="토르" class="character-img" onerror="this.src='https://via.placeholder.com/150/0000FF/FFFFFF?text=THOR'">
                </div>
                <div class="p-4 text-center">
                    <h3 class="text-xl font-bold text-black mb-1">박찬영</h3>
                    <p class="text-xs text-blue-700 font-bold">THUNDER MAKER</p>
                </div>
            </div>

            <!-- 김인옥 책임 (여자 히어로 - 원더우먼) -->
            <div class="hero-card" onclick="showStatus('김인옥', '책임', 'WONDER PLANNER', '70', '95', '50', 'lego_wonderwoman.jpg', '진실의 올가미와 같은 정확함으로 기획과 운영을 이끄는 팀의 원더우먼!')">
                <div class="hero-bg h-48 flex items-center justify-center bg-white">
                    <img src="lego_wonderwoman.jpg" alt="원더우먼" class="character-img" onerror="this.src='https://via.placeholder.com/150/FFD700/000000?text=WONDER'">
                </div>
                <div class="p-4 text-center">
                    <h3 class="text-xl font-bold text-black mb-1">김인옥</h3>
                    <p class="text-xs text-amber-700 font-bold">WONDER PLANNER</p>
                </div>
            </div>

            <!-- 박경환 책임 (아이언맨) -->
            <div class="hero-card" onclick="showStatus('박경환', '책임', 'IRON MASTER', '100', '90', '75', 'lego_ironman.jpg', '최첨단 지식과 아크 리액터 같은 지치지 않는 에너지로 무장했습니다.')">
                <div class="hero-bg h-48 flex items-center justify-center bg-white">
                    <img src="lego_ironman.jpg" alt="아이언맨" class="character-img" onerror="this.src='https://via.placeholder.com/150/FF0000/FFFFFF?text=IRONMAN'">
                </div>
                <div class="p-4 text-center">
                    <h3 class="text-xl font-bold text-black mb-1">박경환</h3>
                    <p class="text-xs text-gray-800 font-bold">IRON MASTER</p>
                </div>
            </div>

            <!-- 한현수 선임 (요리사) -->
            <div class="hero-card" onclick="showStatus('한현수', '선임', 'MASTER CHEF', '80', '85', '99', 'lego_chef.jpg', '팀원들을 위해 기발한 아이디어와 든든한 지원을 요리해내는 마스터 셰프!')">
                <div class="hero-bg h-48 flex items-center justify-center bg-white">
                    <img src="lego_chef.jpg" alt="요리사" class="character-img" onerror="this.src='https://via.placeholder.com/150/FFA500/FFFFFF?text=CHEF'">
                </div>
                <div class="p-4 text-center">
                    <h3 class="text-xl font-bold text-black mb-1">한현수</h3>
                    <p class="text-xs text-orange-700 font-bold">MASTER CHEF</p>
                </div>
            </div>

            <!-- 이지원 사원 (여자 히어로 - 블랙위도우) -->
            <div class="hero-card" onclick="showStatus('이지원', '사원', 'SECRET AGENT', '90', '80', '60', 'lego_blackwidow.jpg', '눈에 띄지 않게 모든 실무를 완벽하고 깔끔하게 처리하는 블랙 위도우!')">
                <div class="hero-bg h-48 flex items-center justify-center bg-white">
                    <img src="lego_blackwidow.jpg" alt="블랙위도우" class="character-img" onerror="this.src='https://via.placeholder.com/150/000000/FFFFFF?text=WIDOW'">
                </div>
                <div class="p-4 text-center">
                    <h3 class="text-xl font-bold text-black mb-1">이지원</h3>
                    <p class="text-xs text-gray-700 font-bold">SECRET AGENT</p>
                </div>
            </div>

            <!-- 고현수 아르바이트 (여자 히어로 - 캡틴마블) -->
            <div class="hero-card" onclick="showStatus('고현수', '아르바이트', 'STAR ASSISTANT', '95', '70', '85', 'lego_captainmarvel.jpg', '팀에 활력을 불어넣는 캡틴 마블급 에너지를 가진 에이스 아르바이트생!')">
                <div class="hero-bg h-48 flex items-center justify-center bg-white">
                    <img src="lego_captainmarvel.jpg" alt="캡틴마블" class="character-img" onerror="this.src='https://via.placeholder.com/150/FF69B4/FFFFFF?text=MARVEL'">
                </div>
                <div class="p-4 text-center">
                    <h3 class="text-xl font-bold text-black mb-1">고현수</h3>
                    <p class="text-xs text-pink-700 font-bold">STAR ASSISTANT</p>
                </div>
            </div>

        </div>
    </div>

    <!-- 지형 -->
    <div class="ground"></div>

    <!-- 상세 정보 모달 -->
    <div id="statusModal" onclick="closeStatus()">
        <div class="rpg-dialog flex flex-col md:flex-row gap-8" onclick="event.stopPropagation()">
            <div class="w-full md:w-1/3 flex flex-col items-center">
                <img id="modalImg" src="" alt="캐릭터 상세" class="w-full h-48 object-contain mb-4 p-2 bg-white border-4 border-black">
                <div class="text-center">
                    <p id="modalClass" class="text-xs font-bold text-red-600 mb-1"></p>
                    <h2 id="modalName" class="text-2xl font-bold"></h2>
                </div>
            </div>

            <div class="w-full md:w-2/3 space-y-5">
                <div class="border-b-4 border-black pb-2 mb-4">
                    <span class="pixel-font text-[10px] text-gray-400">HERO STATUS WINDOW</span>
                </div>

                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between text-xs font-bold mb-1"><span>☕ COFFEE RECHARGE</span><span id="coffeeVal"></span></div>
                        <div class="stat-container"><div id="coffeeBar" class="stat-fill bg-amber-500"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-xs font-bold mb-1"><span>💼 MISSION LOAD</span><span id="workVal"></span></div>
                        <div class="stat-container"><div id="workBar" class="stat-fill bg-red-600"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-xs font-bold mb-1"><span>🍺 DRINK DEFENSE</span><span id="drinkVal"></span></div>
                        <div class="stat-container"><div id="drinkBar" class="stat-fill bg-green-500"></div></div>
                    </div>
                </div>

                <div class="mt-4 p-3 bg-gray-50 border-2 border-black italic text-sm">
                    <p id="modalDesc"></p>
                </div>

                <button class="w-full py-3 bg-black text-white font-bold hover:bg-gray-800 transition-colors" onclick="closeStatus()">
                    CONFIRM & RETURN
                </button>
            </div>
        </div>
    </div>

    <script>
        function showStatus(name, rank, heroName, coffee, work, drink, imgSrc, desc) {
            const modal = document.getElementById('statusModal');
            document.getElementById('modalName').innerText = name + " " + rank;
            document.getElementById('modalClass').innerText = heroName;
            document.getElementById('modalImg').src = imgSrc;
            document.getElementById('modalDesc').innerText = '"' + desc + '"';
            
            document.getElementById('coffeeVal').innerText = coffee + "%";
            document.getElementById('workVal').innerText = work + "%";
            document.getElementById('drinkVal').innerText = drink + "%";

            modal.style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('coffeeBar').style.width = coffee + "%";
                document.getElementById('workBar').style.width = work + "%";
                document.getElementById('drinkBar').style.width = drink + "%";
            }, 100);
        }

        function closeStatus() {
            document.getElementById('statusModal').style.display = 'none';
            document.getElementById('coffeeBar').style.width = "0%";
            document.getElementById('workBar').style.width = "0%";
            document.getElementById('drinkBar').style.width = "0%";
        }
    </script>
</body>
</html>
